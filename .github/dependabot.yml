# Routine dependency maintenance. Minor/patch bumps are grouped into a single
# weekly PR per ecosystem (CI green = safe to merge); majors arrive as
# individual PRs so breaking changes get looked at one by one.
version: 2
updates:
  - package-ecosystem: "pub"
    directory: "/fishauctions_application"
    schedule:
      interval: "weekly"
    groups:
      flutter-minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "gradle"
    directory: "/fishauctions_application/android"
    schedule:
      interval: "weekly"
    groups:
      android-minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-all:
        update-types: ["major", "minor", "patch"]
