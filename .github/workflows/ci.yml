name: CI

# Lint + test on every PR, and on pushes to the default branch as a safety net.
on:
  pull_request:
  push:
    branches: [master, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    # The Flutter app lives in a subdirectory of the repo.
    working-directory: fishauctions_application

env:
  FLUTTER_VERSION: 3.44.1

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Verify generated code is up to date
        run: |
          dart run build_runner build --delete-conflicting-outputs
          git diff --exit-code || {
            echo "::error::Generated code is stale. Run 'dart run build_runner build --delete-conflicting-outputs' and commit the result.";
            exit 1;
          }

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
