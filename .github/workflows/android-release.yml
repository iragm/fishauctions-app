name: Android Release

# Manually-triggered production release. You click "Run workflow" in the Actions
# tab (optionally choosing a track); it runs the full CI suite as a gate, then
# builds a SIGNED prod .aab. Once the two Play Store prerequisites exist (see the
# upload step below) it also uploads to Google Play. Until then it just publishes
# the .aab as a downloadable artifact — which is what you hand-upload for the
# very first Play Console release.
on:
  workflow_dispatch:
    inputs:
      track:
        description: "Google Play track to release to"
        type: choice
        default: internal
        options: [internal, alpha, beta, production]

concurrency:
  group: android-release-${{ github.ref }}
  # Don't cancel an in-progress release — it may be mid-upload to Google Play.
  cancel-in-progress: false

defaults:
  run:
    working-directory: fishauctions_application

env:
  FLUTTER_VERSION: 3.44.1

jobs:
  # Gate: reuse the exact CI checks (codegen freshness, format, analyze, test) so
  # a release can never ship code that wouldn't pass CI. `release` needs this.
  verify:
    name: CI checks
    uses: ./.github/workflows/ci.yml

  release:
    name: Build & release prod .aab
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # AGP 9's own compile/lint tooling needs JDK 21 to *run* (its bundled
      # lint crashes under JDK 17 — NoSuchMethodError on java.util.List's
      # JDK-21-only removeLast(), reproduced locally against url_launcher_android
      # and fixed by bumping this JDK). This is independent of the app's own
      # bytecode target: build.gradle.kts pins sourceCompatibility/
      # targetCompatibility/kotlin jvmTarget to 17, so the app still compiles
      # and runs against API 28+ as before.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Marketing version = the build date (CalVer, e.g. 2026.7.13), computed
      # by the identical step in ios-release.yml so both stores share one scheme
      # with nothing to bump, store, or forget. `10#` forces base-10 so a leading
      # zero doesn't read as octal (and Apple dislikes "07"). This is only the
      # human-facing string; the per-store build number below is what guarantees
      # uniqueness.
      - name: Compute version name (CalVer)
        run: |
          Y=$(date -u +%Y); M=$(date -u +%m); D=$(date -u +%d)
          echo "BUILD_NAME=$Y.$((10#$M)).$((10#$D))" >> "$GITHUB_ENV"

      # Restore the upload keystore + key.properties from secrets so the build is
      # signed with the real key. If ANDROID_KEYSTORE_BASE64 is unset the build
      # would fall back to debug signing (see build.gradle.kts) — which the Play
      # Store rejects — so here we fail fast instead: a release MUST be signed.
      - name: Restore release signing config
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is missing; a release build must be signed."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.jks
          {
            echo "storeFile=release.jks"
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
          } > android/key.properties
          echo "Wrote android/key.properties and android/app/release.jks"

      # --dart-define=FLAVOR=prod is REQUIRED: Gradle --flavor only sets the
      # applicationId, not the Dart-side environment. Without it the prod build
      # would point at the staging backend.
      #
      # --build-number derives the Android versionCode from the run number.
      # Google Play rejects an upload whose versionCode isn't strictly greater
      # than the last, so this auto-increments it without editing pubspec. (If
      # you also upload by hand, keep hand-picked codes below this run number.)
      # This counter is per-workflow and independent of the iOS build number —
      # separate stores, so they neither need to match nor can collide.
      #
      # --build-name is the CalVer date from the step above (shared scheme with
      # iOS), so the public version moves on its own — pubspec's version is used
      # only for local/dev builds.
      - name: Build signed prod app bundle
        run: >
          flutter build appbundle --release --flavor prod
          --dart-define=FLAVOR=prod
          --build-number=${{ github.run_number }}
          --build-name=$BUILD_NAME

      - name: Upload .aab artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-prod-release-${{ github.sha }}
          path: fishauctions_application/build/app/outputs/bundle/prodRelease/app-prod-release.aab
          if-no-files-found: error
          retention-days: 30

      # Same signing config and version as the .aab above, just packaged as an
      # installable APK — the .aab can't be sideloaded directly. This is what
      # you download to test a release build on a device without fighting a
      # local R8/minify build.
      - name: Build signed prod APK
        run: >
          flutter build apk --release --flavor prod
          --dart-define=FLAVOR=prod
          --build-number=${{ github.run_number }}
          --build-name=$BUILD_NAME

      - name: Upload .apk artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-prod-release-apk-${{ github.sha }}
          path: fishauctions_application/build/app/outputs/flutter-apk/app-prod-release.apk
          if-no-files-found: error
          retention-days: 30

      # Prerequisites (now satisfied): the first .aab was uploaded MANUALLY in
      # the Play Console (Google requires this before the API will accept
      # uploads), and the service-account JSON is stored as the
      # PLAY_SERVICE_ACCOUNT_JSON secret.
      #
      # status: completed publishes the release to the chosen track's testers
      # automatically. Switch back to `draft` if you ever want to review and
      # promote a build by hand in the Play Console before it goes live.
      - name: Upload to Google Play (${{ inputs.track }} track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.fishauctions.app
          releaseFiles: fishauctions_application/build/app/outputs/bundle/prodRelease/app-prod-release.aab
          track: ${{ inputs.track }}
          status: completed

  # iOS builds live in the sibling ios-release.yml (a macOS runner can't share
  # this Linux job). It compiles unsigned today; its signed/TestFlight path is
  # scaffolded pending App Store Connect signing material — see IOS.md.
