name: iOS Release

# Manually-triggered iOS build, mirroring android-release.yml. Runs the full CI
# suite as a gate, then builds the iOS app on a macOS runner.
#
# Two modes via the `distribute` input:
#   • false (default) — WORKS TODAY, no secrets needed: an unsigned
#     `flutter build ios --no-codesign` that compiles the whole app (Swift
#     AppDelegate, plugins, SPM/CocoaPods) on real Apple toolchain and uploads
#     the .app as an artifact. This is the macOS equivalent of the Android
#     compile gate and is how we verify the iOS build before any signing exists.
#   • true — the signed TestFlight path. Scaffolded and fail-fast on missing
#     secrets (same pattern as the Android keystore step). Leave it on `false`
#     until the App Store Connect signing material below is in repo secrets.
on:
  workflow_dispatch:
    inputs:
      distribute:
        description: "Signed build + upload to TestFlight (needs signing secrets)"
        type: boolean
        default: false

concurrency:
  group: ios-release-${{ github.ref }}
  # Don't cancel an in-progress release — it may be mid-upload to App Store Connect.
  cancel-in-progress: false

defaults:
  run:
    working-directory: fishauctions_application

env:
  FLUTTER_VERSION: 3.44.1

jobs:
  # Gate: reuse the exact CI checks (codegen freshness, format, analyze, test) so
  # a build can never ship code that wouldn't pass CI — identical to the Android
  # release's gate. Runs on Linux; only the build job below needs macOS.
  verify:
    name: CI checks
    uses: ./.github/workflows/ci.yml

  build:
    name: Build iOS app
    needs: verify
    # macOS is required for any iOS build. `macos-latest` tracks the current
    # Apple-silicon image; pin (e.g. macos-15) + maxim-lobanov/setup-xcode if a
    # future image bumps Xcode and breaks the build.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # ── Unsigned build (default) ───────────────────────────────────────────
      # No --flavor: iOS has no Xcode schemes; environment selection is
      # dart-define only (Android's --flavor merely sets the applicationId).
      # --no-codesign skips signing, so this needs no certificates — it just
      # proves the app compiles and links on Apple toolchain (the point of the
      # gate today). Build name/number mirror the Android job.
      - name: Build unsigned iOS app
        if: ${{ !inputs.distribute }}
        run: >
          flutter build ios --release --no-codesign
          --dart-define=FLAVOR=prod
          --build-number=${{ github.run_number }}
          --build-name=1.${{ github.run_number }}

      - name: Upload unsigned .app artifact
        if: ${{ !inputs.distribute }}
        uses: actions/upload-artifact@v7
        with:
          name: ios-app-unsigned-${{ github.sha }}
          # Not installable (unsigned) — this is a build-verification artifact.
          path: fishauctions_application/build/ios/iphoneos/Runner.app
          if-no-files-found: error
          retention-days: 14

      # ── Signed build + TestFlight (distribute == true) ─────────────────────
      # Mac-less signing via an App Store Connect API key + Xcode automatic
      # cloud signing (`-allowProvisioningUpdates`): Xcode creates and manages
      # the distribution certificate and provisioning profile in the cloud, so
      # there is NO hand-made cert/.p12 or .mobileprovision to maintain. The
      # only secrets are the API key (three values) and the team id:
      #   APPSTORE_API_KEY_ID       — the key's ID (e.g. 2X9…)
      #   APPSTORE_API_ISSUER_ID    — the issuer UUID (same page)
      #   APPSTORE_API_PRIVATE_KEY  — the .p8 contents (paste the whole file)
      #   APPLE_TEAM_ID             — your 10-char Developer Team ID
      # Step-by-step to create these: PUSH.md / IOS.md. First `distribute:true`
      # run is the shakeout — cloud signing needs the bundle id registered and
      # a TestFlight app record to exist for com.fishauctions.app.
      - name: Check signing secrets
        if: ${{ inputs.distribute }}
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=
          for v in APPSTORE_API_KEY_ID APPSTORE_API_ISSUER_ID APPSTORE_API_PRIVATE_KEY APPLE_TEAM_ID; do
            [ -z "${!v}" ] && missing="$missing $v"
          done
          if [ -n "$missing" ]; then
            echo "::error::Signed iOS build requested but missing secrets:$missing (see IOS.md)."
            exit 1
          fi

      # xcodebuild reads the key from ~/.appstoreconnect/private_keys or
      # ~/private_keys as AuthKey_<KEYID>.p8; the archive/export use it for
      # -allowProvisioningUpdates, and the TestFlight upload reuses it.
      - name: Stage App Store Connect API key
        if: ${{ inputs.distribute }}
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          mkdir -p ~/private_keys
          printf '%s' "$APPSTORE_API_PRIVATE_KEY" > ~/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8

      # Generated (not committed) so the team id stays a secret. Automatic
      # signing means Xcode resolves the profile itself; the API key auth block
      # lets the export talk to App Store Connect non-interactively.
      - name: Write ExportOptions.plist
        if: ${{ inputs.distribute }}
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > ios/ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>signingStyle</key><string>automatic</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>uploadSymbols</key><true/>
          </dict></plist>
          PLIST

      # flutter build ipa archives then exports; with automatic signing it adds
      # -allowProvisioningUpdates and uses the staged API key. DEVELOPMENT_TEAM
      # is forced via the Flutter→Xcode env passthrough so the archive signs.
      - name: Build signed IPA
        if: ${{ inputs.distribute }}
        env:
          FLUTTER_XCODE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: >
          flutter build ipa --release
          --dart-define=FLAVOR=prod
          --build-number=${{ github.run_number }}
          --build-name=1.${{ github.run_number }}
          --export-options-plist=ios/ExportOptions.plist

      - name: Upload to TestFlight
        if: ${{ inputs.distribute }}
        uses: apple-actions/upload-testflight-build@v5
        with:
          app-path: fishauctions_application/build/ios/ipa/fishauctions_application.ipa
          issuer-id: ${{ secrets.APPSTORE_API_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
