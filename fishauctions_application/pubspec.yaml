name: fishauctions_application
description: "FishAuctions mobile client — WebView shell with native Square Tap to Pay and Bluetooth label printing."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  # Native "add to device calendar" — the web's addToCalendar bridge (see
  # webview_screen) hands pickup events to this instead of downloading an .ics.
  add_2_calendar: ^3.1.1
  cupertino_icons: ^1.0.8
  # HTTP & Networking
  dio: ^5.10.0
  # Push notifications (FCM). The Firebase *client* config is delivered at
  # runtime via /api/mobile/config/ and passed to Firebase.initializeApp — no
  # bundled google-services.json, so one binary still serves any deployment
  # (see PushService + PUSH.md). No google-services Gradle plugin is applied.
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.6
  flutter:
    sdk: flutter
  # Bluetooth Low Energy — thermal label printing on iOS + Android. BLE (not
  # classic SPP) so iOS works without MFi. Actively maintained; the transport
  # only — label bytes are produced in LabelRenderer/LabelRaster.
  flutter_blue_plus: ^2.3.10
  # WebView engine. Chosen over webview_flutter for the capabilities the web UI
  # relies on in-app: JS callHandler (calendar bridge), onDownloadStartRequest
  # (authenticated CSV/PDF/.ics/.pkpass downloads), onCreateWindow (target=_blank
  # → system browser), automatic <input type=file> handling, and a cross-platform
  # onPermissionRequest (barcode-scanner camera).
  #
  # Pinned to the 6.2.0-beta line: the 6.1.5 stable Android module's
  # build.gradle uses getDefaultProguardFile('proguard-android.txt'), which
  # AGP 9 (this project's toolchain) rejects with a hard error; 6.2.0-beta.3
  # switches to 'proguard-android-optimize.txt'. Move to 6.2.0 stable once out.
  flutter_inappwebview: 6.2.0-beta.3
  # State management
  flutter_riverpod: ^2.5.1
  # Secure token storage
  flutter_secure_storage: ^10.3.1
  # Serialization
  freezed_annotation: ^2.4.4
  # Device location → latitude/longitude cookies for the WebView (auction/lot
  # distances). Replaces the browser geolocation prompt the web UI uses.
  geolocator: ^14.0.3
  # Navigation
  go_router: ^14.6.2
  # Native Google Sign-In. Google blocks OAuth/One-Tap inside embedded WebViews,
  # so Google login happens natively: the SDK returns an ID token which the
  # backend (/api/mobile/auth/google/) verifies and exchanges for a JWT. Needs a
  # Web OAuth client id in EnvironmentConfig.googleServerClientId.
  google_sign_in: ^7.2.0
  # PNG decode → 1-bit packing for label rasters (pure Dart, test-friendly).
  image: ^4.9.1
  json_annotation: ^4.9.0
  # Logging
  logger: ^2.1.0
  # Open a downloaded file with the OS default handler — .ics into the calendar
  # importer, .pkpass into Wallet (iOS). See DownloadService.
  open_filex: ^4.7.0
  # Installed version/build for device registration — read at runtime so it
  # can never drift from pubspec.yaml (no hand-synced version constant).
  package_info_plus: ^10.2.0
  # Temp directory to stage downloaded bytes before share/open.
  path_provider: ^2.1.6
  # Runtime permissions (Bluetooth, NFC, camera)
  permission_handler: ^12.0.3
  # OS print dialog (Android print framework / AirPrint) + PdfPreview widget.
  # Used by the "System printer" print method: label PDFs from the server are
  # handed to a printer configured on the phone instead of the share sheet.
  printing: ^5.15.0
  # Home-screen quick actions (long-press the launcher icon) deep-linking into
  # web destinations in the shell. Mapping lives in ShortcutService.
  quick_actions: ^1.1.0
  riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  # Share sheet for downloaded CSV/PDF exports (save / open / share).
  share_plus: ^13.2.0
  # Square Mobile Payments SDK — in-person / Tap to Pay.
  # Requires Android minSdk 28 (set in android/app/build.gradle.kts) and the
  # public Square Maven repo (no token); iOS 16+ (set in the Xcode project) and
  # Apple's Tap to Pay entitlement before real charges (checklist: IOS.md).
  # See lib/services/square_payment_service.dart.
  square_mobile_payments_sdk: ^2026.7.2
  # Open external / target=_blank links (connect banners, map directions, Google
  # Wallet) in the system browser instead of the in-app WebView.
  url_launcher: ^6.3.2
dev_dependencies:
  build_runner: ^2.5.4
  # App launcher icon generator — regenerates the Android mipmaps + adaptive
  # icon and the iOS appiconset from a single 1024×1024 master. Run after any
  # icon change: `dart run flutter_launcher_icons`.
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png

# App icon generation. Source is a single 1024×1024 transparent PNG; the tool
# fans it out to every Android density + adaptive icon and the iOS appiconset.
# iOS can't have alpha, so we flatten onto black; Android's adaptive icon uses
# the transparent artwork as the foreground over a black background layer.
# All three flavors share this icon (no per-flavor override).
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  background_color_ios: "#000000"
