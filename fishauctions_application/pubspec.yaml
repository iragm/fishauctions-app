name: fishauctions_application
description: "FishAuctions mobile client — WebView shell with native Square Tap to Pay and Bluetooth label printing."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.6.2

  # HTTP & Networking
  dio: ^5.4.1

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # WebView
  webview_flutter: ^4.10.0

  # Bluetooth (classic BT — Android only; iOS requires MFi)
  flutter_bluetooth_serial: ^0.4.0

  # Runtime permissions (Bluetooth, NFC)
  permission_handler: ^11.3.1

  # Logging
  logger: ^2.1.0

  # Square In-Person SDK (Tap to Pay)
  # Verify exact package name at pub.dev before enabling:
  # square_in_person_sdk: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
