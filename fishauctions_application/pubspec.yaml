name: fishauctions_application
description: "FishAuctions mobile client — WebView shell with native Square Tap to Pay and Bluetooth label printing."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  cupertino_icons: ^1.0.8
  # HTTP & Networking
  dio: ^5.4.1
  flutter:
    sdk: flutter
  # Bluetooth Low Energy — thermal label printing on iOS + Android. BLE (not
  # classic SPP) so iOS works without MFi. Actively maintained; the transport
  # only — label bytes are produced in LabelRenderer/LabelRaster.
  flutter_blue_plus: ^2.3.9
  # State management
  flutter_riverpod: ^2.5.1
  # Secure token storage
  flutter_secure_storage: ^9.2.2
  # Serialization
  freezed_annotation: ^2.4.4
  # Device location → latitude/longitude cookies for the WebView (auction/lot
  # distances). Replaces the browser geolocation prompt the web UI uses.
  geolocator: ^14.0.2
  # Navigation
  go_router: ^14.6.2
  # Native Google Sign-In. Google blocks OAuth/One-Tap inside embedded WebViews,
  # so Google login happens natively: the SDK returns an ID token which the
  # backend (/api/mobile/auth/google/) verifies and exchanges for a JWT. Needs a
  # Web OAuth client id in EnvironmentConfig.googleServerClientId.
  google_sign_in: ^7.2.0
  # PNG decode → 1-bit packing for label rasters (pure Dart, test-friendly).
  image: ^4.3.0
  json_annotation: ^4.9.0
  # Logging
  logger: ^2.1.0
  # Runtime permissions (Bluetooth, NFC)
  permission_handler: ^11.3.1
  riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  # Square Mobile Payments SDK — in-person / Tap to Pay.
  # Requires Android minSdk 28 (set in android/app/build.gradle.kts) and the
  # public Square Maven repo (no token). iOS needs the Tap to Pay entitlement
  # and is not wired up yet. See lib/services/square_payment_service.dart.
  square_mobile_payments_sdk: ^2026.5.1
  # WebView
  webview_flutter: ^4.10.0

dev_dependencies:
  build_runner: ^2.4.8
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
